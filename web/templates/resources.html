<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Vault · AI Resource Agent</title>
  <link rel="stylesheet" href="/static/resources.css?v=2" />
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <a href="/" class="brand">
      <span class="dot">✦</span>
      Resource Agent
    </a>
    <div class="nav-links">
      <a href="/">Chat</a>
      <a href="/resources" class="active">Media Vault</a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>📦 Media Vault</h1>
    <p>Everything you've ever saved — links, images, repos, PDFs, text — in one searchable place.</p>
  </div>

  <!-- STATS -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-chip"><span class="num" id="totalCount">—</span> total</div>
    <div class="stat-chip"><span class="num" id="githubCount">—</span> repos</div>
    <div class="stat-chip"><span class="num" id="imageCount">—</span> images</div>
    <div class="stat-chip"><span class="num" id="webCount">—</span> web pages</div>
    <div class="stat-chip"><span class="num" id="ytCount">—</span> videos</div>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍  Search by title, URL or source…" oninput="render()" />
    <button class="filter-btn on" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('github', this)">GitHub</button>
    <button class="filter-btn" onclick="setFilter('youtube', this)">YouTube</button>
    <button class="filter-btn" onclick="setFilter('image', this)">Images</button>
    <button class="filter-btn" onclick="setFilter('web', this)">Web</button>
    <button class="filter-btn" onclick="setFilter('text', this)">Text</button>
    <div class="view-toggle">
      <button class="view-btn on" id="btnGrid" onclick="setView('grid')" title="Grid view">⊞</button>
      <button class="view-btn"   id="btnList" onclick="setView('list')" title="List view">☰</button>
    </div>
  </div>

  <!-- ITEMS -->
  <div class="items-wrap grid-view" id="itemsWrap"></div>

  <!-- DETAIL MODAL -->
  <div class="overlay" id="overlay" onclick="maybeClose(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="icon-big" id="mIcon"></div>
        <div class="info">
          <h2 id="mTitle">—</h2>
          <div class="meta-row">
            <span class="card-badge" id="mBadge"></span>
            <span style="font-size:.75rem;color:var(--muted)" id="mDate"></span>
          </div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('raw',this)">Raw Input</button>
          <button class="tab" onclick="switchTab('answer',this)">LLM Answer</button>
          <button class="tab-edit-btn" id="editAnswerBtn"
            onclick="toggleEditAnswer()" title="Edit answer">✏️ Edit</button>
        </div>
        <div class="tab-panel show" id="tab-raw"></div>
        <div class="tab-panel"      id="tab-answer"></div>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRM -->
  <div class="del-confirm" id="delConfirm" style="display:none">
    <div class="del-box">
      <h3>Delete this item?</h3>
      <p>This will permanently remove the record from your vault.</p>
      <div class="btns">
        <button class="btn-cancel" onclick="cancelDel()">Cancel</button>
        <button class="btn-del"    onclick="confirmDel()">Delete</button>
      </div>
    </div>
  </div>

  <script src="/static/resources.js?v=4"></script>
</body>
</html>
