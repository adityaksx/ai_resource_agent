<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Vault · AI Resource Agent</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161a22;
      --surface2: #1e2330;
      --border: #2a3040;
      --accent: #6c8aff;
      --accent2: #a78bfa;
      --text: #e8eaf6;
      --muted: #7a85a0;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Top nav ─────────────────────────────────────── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .navbar .brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px;
      text-decoration: none; color: var(--text);
    }
    .navbar .brand .dot {
      width: 32px; height: 32px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .navbar nav { display: flex; gap: 6px; }
    .navbar nav a {
      padding: 7px 16px; border-radius: 8px;
      text-decoration: none; color: var(--muted);
      font-size: 0.88rem; font-weight: 500;
      transition: background .15s, color .15s;
    }
    .navbar nav a:hover { background: var(--surface2); color: var(--text); }
    .navbar nav a.active { background: var(--surface2); color: var(--accent); }

    /* ── Hero header ────────────────────────────────── */
    .hero {
      padding: 56px 40px 32px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: 2.2rem; font-weight: 800;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -1px; margin-bottom: 8px;
    }
    .hero p { color: var(--muted); font-size: 0.97rem; max-width: 520px; }

    /* ── Stats bar ──────────────────────────────────── */
    .stats-bar {
      max-width: 1200px; margin: 0 auto 36px;
      padding: 0 40px;
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.82rem; color: var(--muted);
      display: flex; align-items: center; gap: 7px;
    }
    .stat-chip .num { color: var(--text); font-weight: 700; }

    /* ── Filter bar ─────────────────────────────────── */
    .filter-bar {
      max-width: 1200px; margin: 0 auto 28px;
      padding: 0 40px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar input {
      flex: 1; min-width: 220px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 16px;
      color: var(--text); font-size: 0.9rem;
      outline: none; transition: border-color .15s;
    }
    .filter-bar input:focus { border-color: var(--accent); }
    .filter-bar input::placeholder { color: var(--muted); }
    .filter-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 16px;
      color: var(--muted); font-size: 0.84rem; cursor: pointer;
      transition: all .15s; white-space: nowrap;
    }
    .filter-btn:hover, .filter-btn.on {
      background: var(--accent); border-color: var(--accent);
      color: #fff;
    }
    .view-toggle {
      display: flex; gap: 4px; margin-left: auto;
    }
    .view-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      color: var(--muted); font-size: 1rem; cursor: pointer;
      transition: all .15s;
    }
    .view-btn.on { background: var(--surface2); color: var(--text); }

    /* ── Grid / List container ──────────────────────── */
    .items-wrap {
      max-width: 1200px; margin: 0 auto;
      padding: 0 40px 80px;
    }

    /* Grid */
    .items-wrap.grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    /* List */
    .items-wrap.list-view {
      display: flex; flex-direction: column; gap: 10px;
    }

    /* ── Card (grid) ────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      cursor: pointer;
      transition: transform .18s, border-color .18s, box-shadow .18s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0; transition: opacity .18s;
    }
    .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow); }
    .card:hover::before { opacity: 1; }

    /* List row */
    .list-view .card {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 18px;
      border-radius: 10px;
    }
    .list-view .card:hover { transform: translateX(4px); }
    .list-view .card::before { top: 0; bottom: 0; right: auto; width: 3px; height: auto; }
    .list-view .card-snippet,
    .list-view .card-footer { display: none; }
    .list-view .card-header { margin-bottom: 0; flex: 1; }
    .list-view .card-meta { display: flex; align-items: center; gap: 10px; }
    .list-view .card-num { margin-bottom: 0; }
    .list-view .card-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }
    .list-view .card-date { font-size: 0.75rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

    .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .card-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .card-meta { flex: 1; min-width: 0; }
    .card-num {
      font-size: 0.72rem; color: var(--accent); font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      margin-bottom: 2px;
    }
    .card-title {
      font-size: 0.95rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }
    .card-badge {
      font-size: 0.7rem; font-weight: 700;
      padding: 3px 9px; border-radius: 40px;
      text-transform: uppercase; letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .badge-github  { background: rgba(108,138,255,.15); color: var(--accent); }
    .badge-youtube { background: rgba(248,113,113,.15); color: var(--danger); }
    .badge-web     { background: rgba(52,211,153,.15);  color: var(--success); }
    .badge-image   { background: rgba(167,139,250,.15); color: var(--accent2); }
    .badge-text    { background: rgba(251,191,36,.15);  color: var(--warning); }
    .badge-pdf     { background: rgba(248,113,113,.12); color: #fb923c; }
    .badge-instagram { background: rgba(236,72,153,.15); color: #f472b6; }
    .badge-default { background: rgba(122,133,160,.12); color: var(--muted); }

    .card-snippet {
      font-size: 0.82rem; color: var(--muted);
      line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.75rem; color: var(--muted);
    }
    .card-footer .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      display: inline-block; margin-right: 5px;
    }
    .status-success { background: var(--success); }
    .status-error   { background: var(--danger); }

    /* Delete btn on card */
    .card-del {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.9rem; padding: 4px 6px;
      border-radius: 6px; transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .card-del:hover { color: var(--danger); background: rgba(248,113,113,.1); }

    /* ── Empty state ────────────────────────────────── */
    .empty {
      grid-column: 1/-1;
      text-align: center; padding: 80px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 3rem; margin-bottom: 16px; opacity: .4; }
    .empty h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }

    /* ── Modal overlay ──────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%; max-width: 760px;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      transform: scale(.96); transition: transform .2s;
    }
    .overlay.show .modal { transform: scale(1); }

    .modal-header {
      padding: 24px 28px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 14px;
    }
    .modal-header .icon-big {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .modal-header .info { flex: 1; min-width: 0; }
    .modal-header h2 {
      font-size: 1.1rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .modal-header .meta-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .modal-close {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 1.4rem; line-height: 1;
      padding: 4px 6px; border-radius: 6px;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .modal-close:hover { background: var(--surface2); color: var(--text); }

    .modal-body { padding: 24px 28px; }

    /* ── Tabs ───────────────────────────────────────── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab {
      padding: 7px 18px; border-radius: 8px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      color: var(--muted); border: none; background: none;
      transition: all .15s;
    }
    .tab.active { background: var(--accent); color: #fff; }
    .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.show { display: block; }

    /* ── Raw input block ────────────────────────────── */
    .raw-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 0.85rem; line-height: 1.65;
      color: var(--muted);
      word-break: break-all;
    }
    .raw-block a { color: var(--accent); word-break: break-all; }
    .raw-block a:hover { text-decoration: underline; }
    .raw-block img {
      max-width: 100%; border-radius: 8px;
      margin-top: 10px; border: 1px solid var(--border);
    }
    .raw-block code {
      font-family: 'Fira Mono', monospace;
      font-size: 0.82rem; color: var(--accent2);
    }

    /* ── LLM answer ─────────────────────────────────── */
    .llm-answer {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 18px 20px;
      font-size: 0.88rem; line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }

    .section-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.6px; margin-bottom: 8px;
    }

    /* ── Repo path ───────────────────────────────────── */
    .repo-path {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px;
      text-decoration: none; color: var(--accent);
      font-size: 0.85rem; font-family: 'Fira Mono', monospace;
      transition: border-color .15s;
    }
    .repo-path:hover { border-color: var(--accent); }

    /* ── Delete confirm ──────────────────────────────── */
    .del-confirm {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
    }
    .del-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px 32px;
      text-align: center; max-width: 360px; width: 90%;
      box-shadow: var(--shadow);
    }
    .del-box h3 { margin-bottom: 8px; }
    .del-box p { color: var(--muted); font-size: 0.88rem; margin-bottom: 20px; }
    .del-box .btns { display: flex; gap: 10px; justify-content: center; }
    .del-box button {
      padding: 9px 24px; border-radius: 8px; border: none;
      cursor: pointer; font-weight: 600; font-size: 0.88rem;
      transition: opacity .15s;
    }
    .del-box .btn-cancel { background: var(--surface2); color: var(--text); }
    .del-box .btn-del { background: var(--danger); color: #fff; }
    .del-box button:hover { opacity: .85; }

    /* ── Scrollbar ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @media (max-width: 640px) {
      .navbar { padding: 14px 20px; }
      .hero, .stats-bar, .filter-bar, .items-wrap { padding-left: 20px; padding-right: 20px; }
      .items-wrap.grid-view { grid-template-columns: 1fr; }
      .modal-header, .modal-body { padding: 18px; }
      .view-toggle { margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <a href="/" class="brand">
      <span class="dot">✦</span>
      Resource Agent
    </a>
    <nav>
      <a href="/">Chat</a>
      <a href="/resources" class="active">Media Vault</a>
    </nav>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>📦 Media Vault</h1>
    <p>Everything you've ever saved — links, images, repos, PDFs, text — in one searchable place.</p>
  </div>

  <!-- STATS -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-chip"><span class="num" id="totalCount">—</span> total</div>
    <div class="stat-chip"><span class="num" id="githubCount">—</span> repos</div>
    <div class="stat-chip"><span class="num" id="imageCount">—</span> images</div>
    <div class="stat-chip"><span class="num" id="webCount">—</span> web pages</div>
    <div class="stat-chip"><span class="num" id="ytCount">—</span> videos</div>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍  Search by title, URL or source…" oninput="render()" />
    <button class="filter-btn on" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('github', this)">GitHub</button>
    <button class="filter-btn" onclick="setFilter('youtube', this)">YouTube</button>
    <button class="filter-btn" onclick="setFilter('image', this)">Images</button>
    <button class="filter-btn" onclick="setFilter('web', this)">Web</button>
    <button class="filter-btn" onclick="setFilter('text', this)">Text</button>
    <div class="view-toggle">
      <button class="view-btn on" id="btnGrid" onclick="setView('grid')" title="Grid view">⊞</button>
      <button class="view-btn"   id="btnList" onclick="setView('list')" title="List view">☰</button>
    </div>
  </div>

  <!-- ITEMS -->
  <div class="items-wrap grid-view" id="itemsWrap"></div>

  <!-- DETAIL MODAL -->
  <div class="overlay" id="overlay" onclick="maybeClose(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="icon-big" id="mIcon"></div>
        <div class="info">
          <h2 id="mTitle">—</h2>
          <div class="meta-row">
            <span class="card-badge" id="mBadge"></span>
            <span style="font-size:.75rem;color:var(--muted)" id="mDate"></span>
          </div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('raw',this)">Raw Input</button>
          <button class="tab" onclick="switchTab('answer',this)">LLM Answer</button>
        </div>
        <div class="tab-panel show" id="tab-raw"></div>
        <div class="tab-panel"      id="tab-answer"></div>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRM -->
  <div class="del-confirm" id="delConfirm" style="display:none">
    <div class="del-box">
      <h3>Delete this item?</h3>
      <p>This will permanently remove the record from your vault.</p>
      <div class="btns">
        <button class="btn-cancel" onclick="cancelDel()">Cancel</button>
        <button class="btn-del"    onclick="confirmDel()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let allItems   = [];
    let activeFilter = 'all';
    let currentView  = 'grid';
    let pendingDelId = null;

    /* ── Source helpers ─────────────────────────────── */
    const ICONS = {
      github_repo:'🐙', github_file:'🐙', github_gist:'🐙',
      youtube_video:'▶️', youtube_shorts:'▶️', youtube_playlist:'▶️',
      local_image:'🖼️', image_url:'🖼️',
      pdf_document:'📄', pdf_url:'📄',
      instagram_post:'📸', instagram_reel:'📸',
      web:'🌐', medium_article:'📝', substack_article:'📝',
      arxiv_paper:'🔬', reddit_post:'💬', reddit_subreddit:'💬',
      plain_text:'📋', plain_text_file:'📋',
      huggingface_model:'🤗', huggingface_dataset:'🤗',
    };
    const icon = s => ICONS[s] || '📎';

    function badgeClass(s) {
      if (!s) return 'badge-default';
      if (s.startsWith('github'))    return 'badge-github';
      if (s.startsWith('youtube'))   return 'badge-youtube';
      if (s.includes('image'))       return 'badge-image';
      if (s.includes('text') || s === 'plain_text') return 'badge-text';
      if (s.includes('pdf'))         return 'badge-pdf';
      if (s.startsWith('instagram')) return 'badge-instagram';
      return 'badge-web';
    }

    function filterKey(s) {
      if (!s) return 'other';
      if (s.startsWith('github'))  return 'github';
      if (s.startsWith('youtube')) return 'youtube';
      if (s.includes('image'))     return 'image';
      if (s.includes('text') || s === 'plain_text') return 'text';
      return 'web';
    }

    function fmt(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-IN',
        { day:'numeric', month:'short', year:'numeric' });
    }

    function esc(str) {
      return String(str||'')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }

    /* ── Load ───────────────────────────────────────── */
    async function loadResources() {
      try {
        const r = await fetch('/api/resources?limit=500');
        const d = await r.json();
        allItems = d.resources || [];
        computeStats();
        render();
      } catch(e) {
        document.getElementById('itemsWrap').innerHTML =
          `<div class="empty"><div class="icon">⚠️</div>
           <h3>Could not load resources</h3><p>${e.message}</p></div>`;
      }
    }

    function computeStats() {
      document.getElementById('totalCount').textContent  = allItems.length;
      document.getElementById('githubCount').textContent = allItems.filter(i=>i.source?.startsWith('github')).length;
      document.getElementById('imageCount').textContent  = allItems.filter(i=>i.source?.includes('image')).length;
      document.getElementById('webCount').textContent    = allItems.filter(i=>filterKey(i.source)==='web').length;
      document.getElementById('ytCount').textContent     = allItems.filter(i=>i.source?.startsWith('youtube')).length;
    }

    /* ── Filter / View ──────────────────────────────── */
    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      render();
    }

    function setView(v) {
      currentView = v;
      document.getElementById('btnGrid').classList.toggle('on', v==='grid');
      document.getElementById('btnList').classList.toggle('on', v==='list');
      const wrap = document.getElementById('itemsWrap');
      wrap.className = v === 'grid' ? 'items-wrap grid-view' : 'items-wrap list-view';
      render();
    }

    /* ── Render ─────────────────────────────────────── */
    /* ── Render cards ───────────────────────────────────── */
    function render() {
    const q   = document.getElementById('searchInput').value.toLowerCase();
    let items = allItems;
    if (activeFilter !== 'all')
        items = items.filter(i => filterKey(i.source) === activeFilter);
    if (q)
        items = items.filter(i =>
        (i.vault_title||i.title||'').toLowerCase().includes(q) ||
        (i.url||'').toLowerCase().includes(q) ||
        (i.source||'').toLowerCase().includes(q)
        );

    const wrap = document.getElementById('itemsWrap');
    if (!items.length) {
        wrap.innerHTML = `<div class="empty">
        <div class="icon">🗄️</div>
        <h3>Nothing here yet</h3>
        <p>Start by pasting a link or text in the chat.</p></div>`;
        return;
    }

    wrap.innerHTML = items.map((item) => {
        const num      = allItems.length - allItems.indexOf(item);
        const src      = item.source || 'unknown';
        const cardTitle   = item.vault_title || item.title || item.url || 'Untitled';
        const cardSnippet = item.vault_snippet || (item.llm_output||'').slice(0,160);
        const isGrid   = currentView === 'grid';

        return `
        <div class="card" data-id="${item.id}" onclick="openModal(${item.id})">
        <div class="card-header">
            <div class="card-icon">${icon(src)}</div>
            <div class="card-meta">
            <div class="card-num">#${num}</div>
            <div class="card-title">${esc(cardTitle)}</div>
            ${!isGrid ? `<span class="card-date">${fmt(item.created_at)}</span>` : ''}
            </div>
            <span class="card-badge ${badgeClass(src)}">${src.replace(/_/g,' ')}</span>
            <button class="card-del" title="Delete" onclick="askDel(event,${item.id})">🗑</button>
        </div>
        ${isGrid && cardSnippet ? `<div class="card-snippet">${esc(cardSnippet)}…</div>` : ''}
        ${isGrid ? `
        <div class="card-footer">
            <span><span class="status-dot ${item.status==='error'?'status-error':'status-success'}"></span>${item.status||'processed'}</span>
            <span>${fmt(item.created_at)}</span>
        </div>` : ''}
        </div>`;
    }).join('');
    }


    /* ── Modal popup ────────────────────────────────────── */
    async function openModal(id) {
    const r    = await fetch(`/api/resources/${id}`);
    const item = await r.json();
    const src  = item.source || 'unknown';

    // Header
    document.getElementById('mIcon').textContent  = icon(src);
    document.getElementById('mTitle').textContent = item.vault_title || item.title || item.url || 'Untitled';
    document.getElementById('mBadge').textContent = src.replace(/_/g,' ');
    document.getElementById('mBadge').className   = `card-badge ${badgeClass(src)}`;
    document.getElementById('mDate').textContent  = fmt(item.created_at);

    /* ── Raw Input tab ── */
    let rawHtml = '';
    let ri = null;

    try {
        ri = typeof item.raw_input === 'string' ? JSON.parse(item.raw_input) : item.raw_input;
    } catch(e) {
        ri = null;
    }

    if (ri) {

        // URL / Link / Repo
        if (ri.url) {
        const isRepo = src.startsWith('github');
        rawHtml += `
            <div class="section-label">URL</div>
            <div class="raw-block">
            ${isRepo
                ? `<a class="repo-path" href="${esc(ri.url)}" target="_blank" rel="noopener">
                    🐙 ${esc(ri.url)}
                </a>`
                : `<a href="${esc(ri.url)}" target="_blank" rel="noopener">${esc(ri.url)}</a>`
            }
            </div>`;
        }

        if (item.files) {
            try {
                const f = JSON.parse(item.files);
                if (f.repo_path) {
                rawHtml += `
                    <div class="section-label" style="margin-top:16px">Local Repo</div>
                    <div class="raw-block">
                    <span class="repo-path">📁 ${esc(f.repo_path)}</span>
                    </div>`;
                }
            } catch(e){}
        }

        // Plain text
        if (ri.text) {
        rawHtml += `
            <div class="section-label" style="margin-top:16px">Text</div>
            <div class="raw-block">${esc(ri.text)}</div>`;
        }

        // Image — try filename first, then derive from image_path
        if (ri.image_path || ri.filename) {
        const filename = ri.filename || ri.image_path.split(/[\\/]/).pop();
        const imgSrc   = `/storage/images/${encodeURIComponent(filename)}`;
        rawHtml += `
            <div class="section-label" style="margin-top:16px">Image</div>
            <div class="raw-block">
            <code>${esc(ri.image_path || filename)}</code>
            <br/>
            <img src="${imgSrc}" alt="${esc(filename)}"
                style="max-width:100%;border-radius:8px;margin-top:10px;border:1px solid var(--border)"
                onerror="this.style.display='none'" />
            </div>`;
        }

    } else if (item.raw_input) {
        // fallback: show raw string
        rawHtml = `<div class="raw-block">${esc(String(item.raw_input))}</div>`;
    }

    // If still empty but we have a URL at top-level, show it
    if (!rawHtml && item.url) {
        rawHtml = `
        <div class="section-label">URL</div>
        <div class="raw-block">
            <a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.url)}</a>
        </div>`;
    }

    document.getElementById('tab-raw').innerHTML =
        rawHtml || '<div class="raw-block" style="color:var(--muted)">No raw input stored.</div>';

    /* ── LLM Answer tab ── */
    const ans = item.llm_output
                || (item.error ? `⚠️ Error: ${item.error}` : 'No answer recorded.');
    document.getElementById('tab-answer').innerHTML =
        `<div class="llm-answer">${esc(ans)}</div>`;

    // Reset tabs to first
    document.querySelectorAll('.tab').forEach((t,i)       => t.classList.toggle('active', i===0));
    document.querySelectorAll('.tab-panel').forEach((p,i)  => p.classList.toggle('show',  i===0));

    document.getElementById('overlay').classList.add('show');
    }


    function maybeClose(e) {
      if (e.target === document.getElementById('overlay')) closeModal();
    }
    function closeModal() {
      document.getElementById('overlay').classList.remove('show');
    }
    function switchTab(name, btn) {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('show'));
      document.getElementById('tab-'+name).classList.add('show');
    }

    /* ── Delete ─────────────────────────────────────── */
    function askDel(e, id) {
      e.stopPropagation();
      pendingDelId = id;
      document.getElementById('delConfirm').style.display = 'flex';
    }
    function cancelDel() {
      pendingDelId = null;
      document.getElementById('delConfirm').style.display = 'none';
    }
    async function confirmDel() {
      if (!pendingDelId) return;
      try {
        await fetch(`/api/resources/${pendingDelId}`, { method: 'DELETE' });
        allItems = allItems.filter(i => i.id !== pendingDelId);
        computeStats();
        render();
      } catch(e) { alert('Delete failed: ' + e.message); }
      cancelDel();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); cancelDel(); }
    });

    loadResources();
  </script>
</body>
</html>
