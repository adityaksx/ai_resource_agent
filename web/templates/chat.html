<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resource Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo-icon">🧠</span>
            <span>Resource Agent</span>
        </div>
        <button class="new-thread-btn" onclick="newThread()">＋ New Thread</button>
        <div class="history-section">
            <h3>Recent</h3>
            <ul class="history-list" id="history-list"></ul>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
        <div id="messages" class="messages-container">
            <div id="welcome-screen" class="welcome-screen">
                <h1>Where knowledge begins</h1>
                <p>Mix images, YouTube links, GitHub repos, Instagram posts — all in one message</p>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-wrapper">

            <!-- ★ Attachments chip bar — shown when items are queued -->
            <div id="attachments-panel" class="attachments-panel hidden"></div>

            <!-- Input Box -->
            <div class="input-box">

                <!-- Attach menu -->
                <div class="attach-wrapper">
                    <button class="icon-btn plus-btn" id="attach-btn" title="Attach">＋</button>
                    <div class="attach-menu hidden" id="attach-menu">
                        <label class="menu-item">
                            <span class="menu-icon">🖼</span>
                            <span>Upload image / file</span>
                            <input type="file" id="image-upload" accept="image/*,application/pdf" multiple hidden>
                        </label>
                        <div class="menu-separator"></div>
                        <div class="menu-item" onclick="promptLink('youtube')">
                            <span class="menu-icon">▶</span><span>Add YouTube link</span>
                        </div>
                        <div class="menu-item" onclick="promptLink('github')">
                            <span class="menu-icon">⌥</span><span>Add GitHub repo</span>
                        </div>
                        <div class="menu-item" onclick="promptLink('instagram')">
                            <span class="menu-icon">◈</span><span>Add Instagram post</span>
                        </div>
                        <div class="menu-item" onclick="promptLink('web')">
                            <span class="menu-icon">🌐</span><span>Add any web URL</span>
                        </div>
                    </div>
                </div>

                <!-- Textarea -->
                <textarea
                    id="user-input"
                    placeholder="Add text, or paste links here…"
                    rows="1"
                    oninput="autoResize(this)"
                    onkeydown="handleKey(event)"
                ></textarea>

                <!-- Send -->
                <button class="icon-btn send-btn" id="send-btn" onclick="send()">↑</button>
            </div>

            <div class="disclaimer">AI Agent can make mistakes. Check important info.</div>
        </div>
    </main>
</div>
<script src="/static/chat.js"></script>
</body>
</html>
